    <script>
        (function() {
            const container = document.getElementById('container');
            const dots = document.querySelectorAll('.dots button');
            const pages = document.querySelectorAll('.page');
            const total = pages.length;
            const dotsEl = document.getElementById('dots');
const titleEl = document.getElementById('b3-12');
// 定义媒体查询条件（建议和 CSS 中的 @media 断点保持一致）
const mediaQuery = window.matchMedia('(max-width: 1255px)');

function updateText(e) {
  // 这里的 e.matches 或 mediaQuery.matches 都可以
  if (e.matches) {
    titleEl.innerHTML = '<h3>Water filling port  双出/入水口</h3>';
  } else {
    titleEl.innerHTML = '<h3>Water filling port  出/入水口</h3>';
  }
}
			// 1. 立即执行（注意：初次执行要手动传入 mediaQuery）
updateText(mediaQuery);

// 2. 监听状态变化（仅在 true/false 切换时触发，性能极佳）
mediaQuery.addEventListener('change', updateText);
            // ★ 导航栏自动隐藏
            let hideTimer;

            function showDots() {
                dotsEl.classList.remove('hidden');
                clearTimeout(hideTimer);
                hideTimer = setTimeout(function() {
                    dotsEl.classList.add('hidden');
                }, 2000);
            }

            // 初始显示，2s后自动隐藏
            showDots();

            let isScrolling = false;
            let wheelTimeout = false;

            function getCurrentIndex() {
                const scrollLeft = container.scrollLeft;
                let minDiff = Infinity;
                let idx = 0;
                pages.forEach((page, i) => {
                    const diff = Math.abs(page.offsetLeft - scrollLeft);
                    if (diff < minDiff) {
                        minDiff = diff;
                        idx = i;
                    }
                });
                return idx;
            }

            function updateDots(index) {
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
            }

            function scrollToPage(index, smooth = true) {
                if (index < 0 || index >= total) return;
                if (isScrolling) return;
                isScrolling = true;
                const page = pages[index];
                container.scrollTo({
                    left: page.offsetLeft,
                    behavior: smooth ? 'smooth' : 'auto'
                });
                setTimeout(() => {
                    isScrolling = false;
                }, 500);
            }

            function goToPrev() {
                const cur = getCurrentIndex();
                if (cur > 0) scrollToPage(cur - 1);
            }

            function goToNext() {
                const cur = getCurrentIndex();
                if (cur < total - 1) scrollToPage(cur + 1);
            }

            // ★ 在滚动事件中触发显示
            container.addEventListener('scroll', function() {
                const idx = getCurrentIndex();
                updateDots(idx);
                showDots();
            });

            dots.forEach((dot) => {
                dot.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const index = parseInt(this.getAttribute('data-index'), 10);
                    scrollToPage(index);
                    // ★ 点击导航栏按钮时触发显示
                    showDots();
                });
            });

            // ★ 点击页面任意位置触发显示（事件冒泡到 container）
            container.addEventListener('click', function() {
                showDots();
            });

            // 第二页左下角按钮的点击跳转
            document.querySelectorAll('.p2-0 button').forEach((btn) => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const index = parseInt(this.getAttribute('data-index'), 10);
                    if (!isNaN(index) && index >= 0 && index < total) {
                        scrollToPage(index);
                    }
                    // ★ 点击这些按钮时也触发显示
                    showDots();
                });
            });

            container.addEventListener('wheel', function(e) {
                if (isScrolling) {
                    e.preventDefault();
                    return;
                }
                if (wheelTimeout) {
                    e.preventDefault();
                    return;
                }
                const delta = e.deltaY || e.deltaX;
                if (Math.abs(delta) < 10) {
                    e.preventDefault();
                    return;
                }
                e.preventDefault();
                if (delta > 0) goToNext();
                else goToPrev();
                wheelTimeout = true;
                setTimeout(() => {
                    wheelTimeout = false;
                }, 300);
            }, { passive: false });

            // ★ 键盘事件中触发显示
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    goToPrev();
                    showDots();
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    goToNext();
                    showDots();
                }
            });

            window.addEventListener('load', function() {
                container.scrollLeft = 0;
                updateDots(0);
                // ★ 加载完成后重置计时器
                showDots();
            });

            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    const idx = getCurrentIndex();
                    updateDots(idx);
                }, 100);
            });
        })();
    </script>
